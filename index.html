<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noviera.co</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .grain { background-image: url("https://grainy-gradients.vercel.app/noise.svg"); opacity: 0.03; pointer-events: none; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col justify-center items-center p-6 antialiased">
    
    <div class="fixed inset-0 grain"></div>

    <div class="relative w-full max-w-xl text-center">
        
        <div class="flex justify-center mb-12">
            <div class="flex items-center gap-2 px-3 py-1 rounded-full border border-white/5 bg-white/[0.02] text-[10px] uppercase tracking-[0.2em] text-zinc-500">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
                Under Construction
            </div>
        </div>

        <h1 class="text-[clamp(2.5rem,8vw,4rem)] font-bold tracking-tight mb-4 leading-none">
            noviera<span class="text-emerald-500">.co</span>
        </h1>
        
        <p class="text-zinc-500 text-lg font-medium leading-relaxed max-w-sm mx-auto">
            <span class="text-zinc-400">May 2026.</span>
        </p>

    </div>

    <footer class="absolute bottom-12 w-full text-center">
        <p class="text-[9px] uppercase tracking-[0.3em] text-zinc-800 font-bold">
            &copy; Noviera
        </p>
    </footer>

</body>
</html>
